<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Management System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #222;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      border-left: 5px solid #2563eb;
    }

    .card h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 24px;
      font-weight: bold;
      color: #1d4ed8;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn-primary {
      background: #1d4ed8;
      color: white;
    }

    .btn-primary:hover {
      background: #1e40af;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-edit {
      background: #2563eb;
      color: white;
    }

    .btn-view {
      background: #7c3aed;
      color: white;
    }

    .panel {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .panel h2 {
      margin-bottom: 15px;
      color: #1d4ed8;
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 14px;
      color: #444;
      font-weight: bold;
    }

    .field input, .field select, .field textarea {
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      width: 100%;
    }

    .field textarea {
      resize: vertical;
      min-height: 42px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #eff6ff;
      color: #1d4ed8;
    }

    tr:hover {
      background: #f8fafc;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      padding: 20px;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: 14px;
      padding: 22px;
      max-width: 520px;
      width: 100%;
    }

    .modal-content h3 {
      margin-bottom: 12px;
      color: #1d4ed8;
    }

    .modal-content p {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .modal-close {
      margin-top: 16px;
      background: #1d4ed8;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Provider Management System</h1>
      <p>Register, search, update, and manage provider records easily.</p>
    </div>

    <div class="stats">
      <div class="card">
        <h3>Total Providers</h3>
        <p id="totalProviders">320</p>
      </div>
      <div class="card">
        <h3>Active Providers</h3>
        <p id="activeProviders">285</p>
      </div>
      <div class="card">
        <h3>Hospitals</h3>
        <p id="hospitalProviders">95</p>
      </div>
      <div class="card">
        <h3>Doctors</h3>
        <p id="doctorProviders">50</p>
      </div>
    </div>

    <div class="topbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search provider by name, id, phone, or specialty..." />
      </div>
      <button class="btn btn-primary" onclick="scrollToForm()">Add Provider</button>
    </div>

    <div class="panel" id="formSection">
      <h2>Add Provider</h2>
      <form id="providerForm">
        <div class="field">
          <label>Provider Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="field">
          <label>Provider Type</label>
          <select id="type" required>
            <option value="">Select</option>
            <option>Hospital</option>
            <option>Doctor</option>
            <option>Pharmacy</option>
            <option>Laboratory</option>
          </select>
        </div>
        <div class="field">
          <label>Specialty</label>
          <input type="text" id="specialty" required />
        </div>
        <div class="field">
          <label>Contact Person</label>
          <input type="text" id="contactPerson" required />
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="phone" required />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="status" required>
            <option value="">Select</option>
            <option>Active</option>
            <option>Inactive</option>
          </select>
        </div>
        <div class="field">
          <label>Registration Date</label>
          <input type="date" id="regDate" required />
        </div>
        <div class="field full">
          <label>Address</label>
          <textarea id="address" required></textarea>
        </div>
        <div class="field full">
          <button class="btn btn-primary" type="submit" id="submitBtn">Add Provider</button>
        </div>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Specialty</th>
            <th>Contact Person</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Status</th>
            <th>Reg. Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="providerTable"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="viewModal">
    <div class="modal-content">
      <h3>Provider Details</h3>
      <div id="modalBody"></div>
      <button class="btn modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    let providers = JSON.parse(localStorage.getItem("providers")) || [];
    let editIndex = -1;

    const form = document.getElementById("providerForm");
    const table = document.getElementById("providerTable");
    const searchInput = document.getElementById("searchInput");

    function saveData() {
      localStorage.setItem("providers", JSON.stringify(providers));
    }

    function updateStats() {
      document.getElementById("totalProviders").textContent = "320";
      document.getElementById("activeProviders").textContent = "285";
      document.getElementById("hospitalProviders").textContent = "95";
      document.getElementById("doctorProviders").textContent = "50";
    }

    function renderTable(data = providers) {
      table.innerHTML = "";

      data.forEach((p) => {
        const realIndex = providers.indexOf(p);
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>${p.type}</td>
          <td>${p.specialty}</td>
          <td>${p.contactPerson}</td>
          <td>${p.phone}</td>
          <td>${p.email}</td>
          <td>${p.status}</td>
          <td>${p.regDate}</td>
          <td>
            <div class="actions">
              <button class="btn btn-view" onclick="viewProvider(${realIndex})">View</button>
              <button class="btn btn-edit" onclick="editProvider(${realIndex})">Edit</button>
              <button class="btn btn-danger" onclick="deleteProvider(${realIndex})">Delete</button>
            </div>
          </td>
        `;
        table.appendChild(row);
      });

      updateStats();
    }

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const provider = {
        id: editIndex === -1 ? "PR" + String(Date.now()).slice(-6) : providers[editIndex].id,
        name: document.getElementById("name").value.trim(),
        type: document.getElementById("type").value,
        specialty: document.getElementById("specialty").value.trim(),
        contactPerson: document.getElementById("contactPerson").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim(),
        status: document.getElementById("status").value,
        regDate: document.getElementById("regDate").value,
        address: document.getElementById("address").value.trim()
      };

      if (editIndex === -1) {
        providers.push(provider);
      } else {
        providers[editIndex] = provider;
        editIndex = -1;
        document.getElementById("submitBtn").textContent = "Add Provider";
      }

      saveData();
      renderTable();
      form.reset();
    });

    searchInput.addEventListener("input", function() {
      const term = this.value.toLowerCase();
      const filtered = providers.filter(p =>
        p.name.toLowerCase().includes(term) ||
        p.id.toLowerCase().includes(term) ||
        p.phone.toLowerCase().includes(term) ||
        p.specialty.toLowerCase().includes(term) ||
        p.type.toLowerCase().includes(term)
      );
      renderTable(filtered);
    });

    function deleteProvider(index) {
      if (confirm("Are you sure you want to delete this provider?")) {
        providers.splice(index, 1);
        saveData();
        renderTable();
      }
    }

    function editProvider(index) {
      const p = providers[index];
      document.getElementById("name").value = p.name;
      document.getElementById("type").value = p.type;
      document.getElementById("specialty").value = p.specialty;
      document.getElementById("contactPerson").value = p.contactPerson;
      document.getElementById("phone").value = p.phone;
      document.getElementById("email").value = p.email;
      document.getElementById("status").value = p.status;
      document.getElementById("regDate").value = p.regDate;
      document.getElementById("address").value = p.address;

      editIndex = index;
      document.getElementById("submitBtn").textContent = "Update Provider";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function viewProvider(index) {
      const p = providers[index];
      document.getElementById("modalBody").innerHTML = `
        <p><b>ID:</b> ${p.id}</p>
        <p><b>Name:</b> ${p.name}</p>
        <p><b>Type:</b> ${p.type}</p>
        <p><b>Specialty:</b> ${p.specialty}</p>
        <p><b>Contact Person:</b> ${p.contactPerson}</p>
        <p><b>Phone:</b> ${p.phone}</p>
        <p><b>Email:</b> ${p.email}</p>
        <p><b>Status:</b> ${p.status}</p>
        <p><b>Registration Date:</b> ${p.regDate}</p>
        <p><b>Address:</b> ${p.address}</p>
      `;
      document.getElementById("viewModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("viewModal").style.display = "none";
    }

    function scrollToForm() {
      document.getElementById("formSection").scrollIntoView({ behavior: "smooth" });
    }

    document.getElementById("viewModal").addEventListener("click", function(e) {
      if (e.target === this) closeModal();
    });

    renderTable();
  </script>
</body>
</html>
